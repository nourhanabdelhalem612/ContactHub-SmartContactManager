<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContactHub - Smart Contact Manager</title>
    <link rel="icon" href="Images/icon.png">
    <link rel="stylesheet" href="CSS/all.min.css">
    <link rel="stylesheet" href="CSS/bootstrap.min.css">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/media.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
      <div class="container">
        <div class="navbar-brand">
          <div class="logo">
            <div class="logo-icon">
              <i class="fas fa-address-book"></i>
            </div>
            <div class="logo-text">
              <span class="logo-main"
                >Contact<span class="logo-hub">Hub</span></span
              >
              <span class="logo-tagline">Smart Contact Manager</span>
            </div>
          </div>
        </div>
        <div class="navbar-actions">
          <button
            class="btn btn-primary"
            id="addContactBtn"
            onclick="showModal()"
          >
            <i class="fas fa-plus"></i> Add <span class="hide-on-mobile">Contact</span>
          </button>
          <div class="nav-icons">
            <i class="fas fa-bell"></i>
            <i class="fas fa-cog"></i>
            <div class="profile-pic">
              <img
                src="Images/avaterr.jpg"
                alt="Profile"
              />
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Dashboard Cards -->
    <div class="container dashboard-cards">
      <div class="row g-3">
        <div class="col-md-4 col-6">
          <div class="stat-card stat-total">
            <div class="stat-icon">
              <i class="fas fa-users fa-xs"></i>
            </div>
            <div class="stat-info">
              <div class="stat-label">TOTAL</div>
              <div class="stat-value" id="totalContacts">0</div>
            </div>
          </div>
        </div>
        <div class="col-md-4 col-6">
          <div class="stat-card stat-favorites">
            <div class="stat-icon">
              <i class="fas fa-star fa-xs"></i>
            </div>
            <div class="stat-info">
              <div class="stat-label">FAVORITES</div>
              <div class="stat-value" id="favoritesCount">0</div>
            </div>
          </div>
        </div>
        <div class="col-md-4 col-6">
          <div class="stat-card stat-emergency">
            <div class="stat-icon">
              <i class="fas fa-heartbeat fa-xs"></i>
            </div>
            <div class="stat-info">
              <div class="stat-label">EMERGENCY</div>
              <div class="stat-value" id="emergencyCount">0</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="container main-content">
      <div class="row">
        <!-- Left Side - All Contacts -->
        <div class="col-lg-8">
          <div class="contacts-section">
            <div class="section-header">
              <h2>All Contacts</h2>
              <p class="section-subtitle">
                Manage and organize your
                <span id="contactsCount">2</span> contacts
              </p>
            </div>

            <div class="search-bar">
              <i class="fas fa-search"></i>
              <input
                type="text"
                placeholder="Search contacts..."
                id="searchInput"
              />
            </div>

            <div class="contacts-list" id="contactsList">
              <div class="container">
                <div class="row g-4" id="rowData">
                  <!-- <p class="alert alert-danger text-center">No contacts found</p> -->
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Side - Sidebar -->
        <div class="col-lg-4">
          <div class="sidebar">
            <!-- Favorites Section -->
            <div class="sidebar-section">
                <div class="sidebar-header">
                    <div><i class="fas fa-star"></i></div>
                    <div class="">
                    <h3>Favorites</h3>
                    <p class="sidebar-subtitle">Quick access to starred contacts</p>
                    </div>
                </div> 
              <div class="favorites-list" id="favoritesList"></div>
            </div>

            <!-- Emergency Section -->
            <div class="sidebar-section">
              <div class="sidebar-header">
                <div>
                    <i class="fas fa-heartbeat"></i>
                </div>
                <div>
                    <h3>Emergency</h3>
                    <p class="sidebar-subtitle">
                Important contacts for urgent calls
              </p>
                </div>
              </div>
              <div class="emergency-list" id="emergencyList"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Add Contact & Edit Contact Modal -->
    <div
      class="modal fade"
      id="contactModal"
      tabindex="-1"
      aria-labelledby="contactModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="contactModalLabel">Add New Contact</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="contactForm">
              <!-- Form Fields -->
              <div class="form-group">
                <label for="fullName"
                  >Full Name <span class="required">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="fullName"
                  placeholder="Enter full name"
                  required
                />
              </div>

              <div class="form-group">
                <label for="phoneNumber"
                  >Phone Number <span class="required">*</span></label
                >
                <input
                  type="tel"
                  class="form-control"
                  id="phoneNumber"
                  placeholder="e.g., 01012345678"
                  required
                />
              </div>

              <div class="form-group">
                <label for="emailAddress">Email Address</label>
                <input
                  type="email"
                  class="form-control"
                  id="emailAddress"
                  placeholder="name@example.com"
                />
              </div>

              <div class="form-group">
                <label for="address">Address</label>
                <input
                  type="text"
                  class="form-control"
                  id="address"
                  placeholder="Enter address"
                />
              </div>

              <div class="form-group">
                <label for="group">Group</label>
                <select class="form-control" id="group">
                  <option value="">Select a group</option>
                  <option value="Family">Family</option>
                  <option value="Friends">Friends</option>
                  <option value="Work">Work</option>
                  <option value="School">School</option>
                  <option value="Other">Other</option>
                </select>
              </div>

              <div class="form-group">
                <label for="notes">Notes</label>
                <textarea
                  class="form-control"
                  id="notes"
                  rows="3"
                  placeholder="Add notes about this contact"
                ></textarea>
              </div>

              <!-- Checkboxes -->
              <div class="form-checkboxes">
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="isFavorite"
                  />
                  <label class="form-check-label" for="isFavorite">
                    <i class="fas fa-star"></i> Favorite
                  </label>
                </div>
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="isEmergency"
                  />
                  <label class="form-check-label" for="isEmergency">
                    <i class="fas fa-heartbeat"></i> Emergency
                  </label>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-primary d-flex justify-content-center align-items-center gap-2"
              id="saveContactBtn"
            >
              <i class="fas fa-check"></i> Save Contact
            </button>
            <button
              type="button"
              class="btn btn-warning d-none py-2 px-4 text-white justify-content-center align-items-center gap-2"
              id="updateContactBtn"
            >
              <i class="fas fa-check"></i> update Contact
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="JS/bootstrap.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="JS/main.js"></script>
</body>
</html>
